name: 매일 웹진 자동 생성

# 언제 실행할지
on:
  schedule:
    # 매일 KST 오전 7시 = UTC 22:00 (전날). GitHub Actions는 UTC 기준.
    # UTC 22시는 자정(UTC 00~01) 혼잡 구간을 벗어나 지연이 덜하다.
    - cron: '0 22 * * *'
  workflow_dispatch:   # Actions 탭에서 수동 실행도 가능

# 생성 결과를 저장소에 자동 저장(커밋)하기 위한 쓰기 권한
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) 저장소 코드 가져오기
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      # 2) 파이썬 설치
      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3) 필요한 라이브러리 설치
      #    requests/dotenv: 뉴스 수집용, anthropic: 부정필터·요약용
      - name: 라이브러리 설치
        run: pip install requests python-dotenv anthropic

      # 4) 뉴스 수집 (STEP 1)
      - name: 뉴스 수집 실행
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python collect.py

      # 5) 부정 뉴스 필터링 + 요약 (STEP 2)
      - name: 부정 필터링 및 요약 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python filter.py

      # 6) 웹진 생성 (STEP 3)
      - name: 웹진 생성 실행
        run: python generate.py

      # 7) 생성 결과를 저장소에 반영 (변경 있을 때만 커밋)
      - name: 생성 결과 저장소에 반영
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 사항 없음 - 커밋 생략"
          else
            git commit -m "자동 생성: 웹진 업데이트"
            git push
          fi
